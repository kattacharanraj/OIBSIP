<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Temperature Converter</h1>

        <div class="converter-box">
            <div class="input-section">
                <label for="temperature">Enter Temperature:</label>
                <input type="number" id="temperature" placeholder="Enter value" step="0.01">
            </div>

            <div class="unit-section">
                <label>From:</label>
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="fromUnit" value="celsius" checked>
                        Celsius (°C)
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="fromUnit" value="fahrenheit">
                        Fahrenheit (°F)
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="fromUnit" value="kelvin">
                        Kelvin (K)
                    </label>
                </div>
            </div>

            <div class="unit-section">
                <label>To:</label>
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="toUnit" value="celsius">
                        Celsius (°C)
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="toUnit" value="fahrenheit" checked>
                        Fahrenheit (°F)
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="toUnit" value="kelvin">
                        Kelvin (K)
                    </label>
                </div>
            </div>

            <button class="convert-btn" onclick="convertTemperature()">Convert</button>

            <div class="result-section" id="resultSection" style="display: none;">
                <h2>Result:</h2>
                <p id="resultText"></p>
            </div>

            <div class="error-section" id="errorSection" style="display: none;">
                <p id="errorText"></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
